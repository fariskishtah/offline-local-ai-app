# docker-compose.yml
services:

  ollama:
    image: ollama/ollama
    container_name: local-ai-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  app:
    image: python:3.11-slim
    container_name: local-ai-app
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    command: >
      bash -c "pip install -q -r requirements.txt &&
               streamlit run app.py
               --server.port=8501
               --server.address=0.0.0.0
               --browser.gatherUsageStats=false"
    restart: unless-stopped

volumes:
  ollama_data: